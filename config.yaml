llm:
  provider: openai_compat
  model: deepseek-chat
  api_key: ''                # 💡 用户自己的 Key，启动时输入
  base_url: https://api.deepseek.com
  context_window: 1000000
  max_tokens: 8192
  temperature: 0.3
  top_p: 0.9
  frequency_penalty: 0
  presence_penalty: 0
  reasoning:
    model: deepseek-reasoner
    temperature: 0.1
  vision:
    provider: kimi
    model: kimi-k2.5
    api_key: ''               # 💡 Kimi 看图 Key，启动时一并输入
    base_url: https://api.moonshot.cn/v1

knowledge:
  priority: [context, rag, search]
  context:
    window: 1000000
    max_session_turns: 200
    persist: true
  rag:
    type: local
    index_mode: hybrid
    sources:
      - skills/xhs-content-factory/references/
      - data/shared/rag/          # 共享 RAG 库（匿名汇总）
    auto_index: true
    memory_feedback: true
  search:
    backend: searxng
    base_url: http://172.27.202.242:8080
    max_results: 5

user:
  data_dir: data/users/          # 用户数据根目录
  shared_dir: data/shared/       # 共享数据目录
  privacy:
    default: sync                # sync = 共享模式 | local = 私有模式

hallucination_guard:
  enabled: true
  temperature_limit: 0.3
  fact_check:
    anchors:
      - skeleton_data
      - kimi_vision_output
      - config_defaults
      - reference_docs
  confidence_marking: true

evolution:
  aesthetic:
    enabled: true
    summarize_interval: 10
  clip_rules:
    enabled: true
    auto_propose: true

critic:
  enabled: true
  pre_check: true
  risk_marking: true

output:
  work_dir: .                     # 项目根目录
  clip_temp: output/clips/
  frames: output/frames/
  final: output/final/
  logs: data/logs/
