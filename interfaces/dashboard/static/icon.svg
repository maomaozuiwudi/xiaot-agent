<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 猫耳朵 -->
  <polygon points="120,210 170,80 220,200" fill="#60a5fa" opacity="0.9"/>
  <polygon points="292,200 342,80 392,210" fill="#60a5fa" opacity="0.9"/>
  <!-- 猫脸 -->
  <ellipse cx="256" cy="270" rx="140" ry="110" fill="#1e293b"/>
  <!-- 左眼 -->
  <ellipse cx="210" cy="250" rx="22" ry="25" fill="#34d399"/>
  <ellipse cx="210" cy="250" rx="10" ry="14" fill="#0a0e17"/>
  <!-- 右眼 -->
  <ellipse cx="302" cy="250" rx="22" ry="25" fill="#34d399"/>
  <ellipse cx="302" cy="250" rx="10" ry="14" fill="#0a0e17"/>
  <!-- 鼻子 -->
  <polygon points="256,275 248,290 264,290" fill="#f472b6"/>
  <!-- 嘴巴 -->
  <path d="M240 298 Q256 315 272 298" fill="none" stroke="#8892b0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="290" x2="256" y2="305" stroke="#8892b0" stroke-width="2" stroke-linecap="round"/>
  <!-- 胡须左 -->
  <line x1="140" y1="270" x2="190" y2="280" stroke="#8892b0" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="145" y1="295" x2="195" y2="290" stroke="#8892b0" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- 胡须右 -->
  <line x1="322" y1="280" x2="372" y2="270" stroke="#8892b0" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="317" y1="290" x2="367" y2="295" stroke="#8892b0" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <!-- 底部文字背景 -->
  <rect x="130" y="365" width="252" height="55" rx="27" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="256" y="400" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#60a5fa" text-anchor="middle">小t Agent</text>
</svg>
