# 小t Agent 配置模板
# 复制此文件为 config.yaml 并填入你的 API Key

llm:
  provider: openai_compat
  model: deepseek-chat
  api_key: ""               # ← 填入你的 API Key
  base_url: https://api.deepseek.com
  context_window: 1000000
  max_tokens: 8192
  temperature: 0.3
  vision:
    provider: kimi
    model: kimi-k2.5
    api_key: ""             # ← 选填，看图用
    base_url: https://api.moonshot.cn/v1

rnote:
  api_key: ""               # ← 选填，小红书搜索用

knowledge:
  context:
    window: 1000000
    max_session_turns: 200
  rag:
    type: local
    index_mode: hybrid
    auto_index: true
  search:
    backend: tavily         # 或 searxng
    max_results: 5

user:
  data_dir: data/users/
  privacy:
    default: sync

hallucination_guard:
  enabled: true
  temperature_limit: 0.3

evolution:
  aesthetic:
    enabled: true
    summarize_interval: 10
  clip_rules:
    enabled: true

output:
  work_dir: output/
  clip_temp: output/clips/
  frames: output/frames/
  final: output/final/
  logs: data/logs/

# 图片/视频生成（登录时选择，也可手动改）
image_gen:
  provider: ""          # 可选: jimeng, openai, gemini, main_model
  api_key: ""           # OpenAI/Gemini 的 Key（即梦走 ~/.jimeng_key）

# MCP 服务器（可选）
# 在此配置外部 MCP server，server 的工具会自动注册到 ToolRegistry
# 工具名以 mcp_<server_name>_<original_name> 格式注册
mcp_servers:
  # 示例：本地 Python MCP server
  # my_server:
  #   command: python
  #   args: ["C:/path/to/mcp_server.py"]

  # 示例：uiautomation MCP server
  # uiautomation:
  #   command: python
  #   args: ["E:/任务/任务主线/uiautomation_mcp/run_server.py"]
